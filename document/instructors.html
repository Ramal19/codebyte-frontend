<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tədris Bacarıqları Bölməsi</title>
    <link rel="stylesheet" href="../style/instructors.css">
</head>

<body>

    <section class="main-section">
        <div class="content-left">
            <div class="badge">
                <div class="icon-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3d5a32" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                </div>
                <span>Təcrübəli müəllimlər</span>
            </div>
            <h1>Bizim tədris üçün inanılmaz bacarıqlarımız var.</h1>
            <p class="description">Lorem ipsum sadəcə çap və çap sənayesi lorem ipsumun saxtasıdır.</p>
        </div>

        <div class="stats-right">
            <div class="skill-item">
                <div class="circle-container">
                    <svg>
                        <defs>
                            <linearGradient id="gradient_style" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:var(--accent-lime);stop-opacity:1" />
                                <stop offset="100%" style="stop-color:var(--primary-green);stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <circle class="bg-circle" cx="80" cy="80" r="70"></circle>
                        <circle id="circle90" class="progress-circle" cx="80" cy="80" r="70"></circle>
                    </svg>
                    <div class="number" id="num90">0%</div>
                </div>
                <div class="skill-label">Nəticələrə görə dəyər</div>
            </div>

            <div class="skill-item">
                <div class="circle-container">
                    <svg>
                        <circle class="bg-circle" cx="80" cy="80" r="70"></circle>
                        <circle id="circle95" class="progress-circle" cx="80" cy="80" r="70"></circle>
                    </svg>
                    <div class="number" id="num95">0%</div>
                </div>
                <div class="skill-label">Qlobal təcrübə</div>
            </div>
        </div>
    </section>

    <script src="../script/instructors.js"></script>
</body>

</html>
