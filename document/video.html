<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kursa bax - CodeByte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary-dark: #1c1d1f;
            --accent-blue: #2da0fd;
            --text-main: #2d2f31;
            --text-light: #6a6f73;
            --border-color: #d1d7dc;
            --bg-light: #f7f9fa;
        }

        /* Mövcud stillər saxlanıldı... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--primary-dark);
            color: #fff;
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            border-bottom: 1px solid #3e4143;
        }

        .navbar {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: space-between;
        }

        .left-side {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .logo img {
            height: 30px;
            filter: brightness(0) invert(1);
        }

        .course-name {
            font-size: 14px;
            font-weight: 500;
            border-left: 1px solid #3e4143;
            padding-left: 15px;
            color: #d1d7dc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 400px;
        }

        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .video-container-main {
            flex: 3;
            overflow-y: auto;
            position: relative;
        }

        #main-video {
            width: 100%;
            background-color: #000;
            aspect-ratio: 16 / 9;
            display: block;
        }

        .btns {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: #fff;
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .btn {
            background: none;
            border: none;
            padding: 15px 20px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }

        .btn.active-btn {
            color: var(--primary-dark);
            border-bottom: 2px solid var(--primary-dark);
        }

        .tab-content-wrapper {
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* YENİ: SƏNƏDLƏR ÜÇÜN STİLLƏR */
        .document-list {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }

        .document-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--bg-light);
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            transition: 0.3s;
            text-decoration: none;
            color: var(--text-main);
        }

        .document-item:hover {
            background: #fff;
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .document-item i {
            font-size: 1.5rem;
            margin-right: 15px;
            color: #ff4d4d;
            /* PDF rəngi */
        }

        .doc-info {
            flex-grow: 1;
        }

        .doc-info span {
            display: block;
            font-weight: 600;
            font-size: 14px;
        }

        .doc-info small {
            color: var(--text-light);
            font-size: 12px;
        }

        /* Rating & Comment stilləri eynilə saxlanıldı... */
        .rating-section-container {
            background: var(--bg-light);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        #star-rating {
            display: flex;
            gap: 5px;
            margin: 10px 0;
        }

        .star {
            font-size: 30px;
            color: #ccc;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #comment-input textarea {
            width: 100%;
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 4px;
            resize: none;
            font-size: 15px;
            margin-bottom: 10px;
        }

        #submit-comment {
            background: var(--primary-dark);
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }

        .comment {
            display: flex;
            gap: 15px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .profil span {
            width: 45px;
            height: 45px;
            background: var(--primary-dark);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 700;
            text-transform: uppercase;
        }

        .thumbs {
            flex: 1;
            background-color: #fff;
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
        }

        .thumbs-header {
            padding: 15px 20px;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-light);
        }

        .video-thumbnail {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: 0.2s;
        }

        .video-thumbnail:hover {
            background-color: var(--bg-light);
        }

        .video-thumbnail img {
            width: 80px;
            border-radius: 4px;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <header>
        <div class="navbar">
            <div class="left-side">
                <div class="logo"><img src="../image/codebyteLogoMa.png" alt="Logo"></div>
                <div class="course-name"><span id="course-title"></span></div>
            </div>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="video-container-main">
            <video id="main-video" controlsList="nodownload" controls></video>

            <div class="btns">
                <button class="btn" id="overview-btn">Ümumi baxış</button>
                <button class="btn" id="resources-btn">Resurslar</button>
                <button class="btn active-btn" id="comments-btn">Rəylər</button>
            </div>

            <div class="tab-content-wrapper">
                <div id="overview-section" style="display: none;">
                    <h3 id="overview-course-name" style="margin-bottom: 10px;"></h3>
                    <p id="overview-category" style="color: var(--accent-blue); font-weight: 600; margin-bottom: 20px;">
                    </p>
                    <div id="overview-description"></div>
                </div>

                <div id="resources-section" style="display: none;">
                    <h3>Kurs Materialları</h3>
                    <div id="document-list" class="document-list">
                    </div>
                </div>

                <div id="comments-rating-container">
                    <div class="rating-section-container" id="rating-section">
                        <h3>Kursa Reytinq Ver</h3>
                        <div id="star-rating">
                            <span class="star" data-score="1">☆</span>
                            <span class="star" data-score="2">☆</span>
                            <span class="star" data-score="3">☆</span>
                            <span class="star" data-score="4">☆</span>
                            <span class="star" data-score="5">☆</span>
                        </div>
                        <p id="rating-message">Kursu qiymətləndirərək bizə dəstək olun.</p>
                    </div>

                    <div class="comments-section-container" id="comments-section">
                        <h3>Şərhlər</h3>
                        <div id="comment-input">
                            <textarea id="comment-text" placeholder="Şərhinizi yazın..." rows="3"></textarea>
                            <button id="submit-comment">Şərh Yaz</button>
                        </div>
                        <div id="comments-list" style="margin-top: 50px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="thumbs">
            <div class="thumbs-header">Kursun Məzmunu</div>
            <div id="video-list"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://codebyte-backend-ibyq.onrender.com";
        const post = JSON.parse(localStorage.getItem("selectedPost"));

        if (!post) {
            document.body.innerHTML = "<h3 style='padding:50px; text-align:center;'>Kurs tapılmadı</h3>";
        } else {
            document.getElementById("course-title").textContent = post.text;
            document.getElementById("overview-course-name").textContent = post.text;
            document.getElementById("overview-category").textContent = post.category || "Kateqoriya yoxdur";

            const video = document.getElementById("main-video");
            const list = document.getElementById("video-list");
            const commentsList = document.getElementById("comments-list");
            const commentTextarea = document.getElementById("comment-text");
            const submitButton = document.getElementById("submit-comment");
            const starRatingDiv = document.getElementById("star-rating");
            const ratingMessage = document.getElementById("rating-message");
            const stars = starRatingDiv.querySelectorAll('.star');

            let currentVideoIndex = 0;
            let userHasRated = false;
            let userCurrentScore = 0;

            // --- SƏNƏDLƏRİ RENDER ETMƏK ---
            function loadDocuments() {
                const docContainer = document.getElementById("document-list");
                if (post.documents && post.documents.length > 0) {
                    docContainer.innerHTML = post.documents.map((docUrl, index) => `
                        <a href="${docUrl}" target="_blank" class="document-item">
                            <i class="bi bi-file-earmark-pdf-fill"></i>
                            <div class="doc-info">
                                <span>Material #${index + 1}</span>
                                <small>Yükləmək və ya baxmaq üçün klikləyin</small>
                            </div>
                            <i class="bi bi-download" style="color: var(--text-light); font-size: 1rem;"></i>
                        </a>
                    `).join('');
                } else {
                    docContainer.innerHTML = "<p style='color:var(--text-light);'>Bu kurs üçün əlavə material yüklənməyib.</p>";
                }
            }

            // --- REYTİNQ FUNKSİYALARI ---
            const renderStars = (score) => {
                stars.forEach(star => {
                    const starScore = parseInt(star.dataset.score);
                    star.textContent = starScore <= score ? '★' : '☆';
                    star.style.color = starScore <= score ? '#b4690e' : '#ccc';
                });
            };

            const handleStarClick = async (score) => {
                const token = localStorage.getItem('token');
                if (!token) { Swal.fire("Daxil Olun", "Reytinq vermək üçün daxil olmalısınız.", "warning"); return; }
                if (userHasRated) { Swal.fire("Məlumat", "Siz artıq bu kursa reytinq vermisiniz.", "info"); return; }

                try {
                    const response = await fetch(`${API_URL}/rate-course`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                        body: JSON.stringify({ courseId: post.id, score: score }),
                    });
                    if (response.ok) {
                        userHasRated = true;
                        userCurrentScore = score;
                        Swal.fire("Uğurlu!", "Reytinqiniz qeydə alındı.", "success");
                        loadUserRating(post.id);
                    }
                } catch (error) { console.error("Xəta:", error); }
            };

            async function loadUserRating(courseId) {
                const token = localStorage.getItem('token');
                try {
                    const res = await fetch(`${API_URL}/course-rating/${courseId}`);
                    const data = await res.json();
                    ratingMessage.textContent = `Kursun orta balı: ${data.averageRating.toFixed(1)} (${data.count} səs)`;
                } catch (e) { console.error(e); }
                if (!token) return;
                try {
                    const userRes = await fetch(`${API_URL}/user-rating/${courseId}`, {
                        headers: { "Authorization": `Bearer ${token}` },
                    });
                    if (userRes.ok) {
                        const userData = await userRes.json();
                        userHasRated = userData.hasRated;
                        userCurrentScore = userData.score;
                        if (userHasRated) { renderStars(userCurrentScore); starRatingDiv.style.pointerEvents = 'none'; }
                    }
                } catch (e) { console.error(e); }
            }

            stars.forEach(star => {
                star.addEventListener('click', () => handleStarClick(parseInt(star.dataset.score)));
                star.addEventListener('mouseover', () => renderStars(parseInt(star.dataset.score)));
                star.addEventListener('mouseout', () => renderStars(userCurrentScore));
            });

            // --- ŞƏRH FUNKSİYALARI ---
            async function loadComments(postId, videoIndex) {
                commentsList.innerHTML = "Yüklənir...";
                try {
                    const response = await fetch(`${API_URL}/comments/${postId}/${videoIndex}`);
                    const comments = await response.json();
                    commentsList.innerHTML = comments.length === 0 ? "<p>Hələ şərh yoxdur.</p>" : "";
                    comments.forEach(c => {
                        const div = document.createElement("div");
                        div.className = "comment";
                        let date = c.createdAt && c.createdAt._seconds ? new Date(c.createdAt._seconds * 1000).toLocaleDateString() : 'N/A';
                        div.innerHTML = `
                            <div class="profil"><span>${c.username[0]}</span></div>
                            <div class="comment-main">
                                <strong>${c.username}</strong>
                                <p>${c.text}</p>
                                <small>${date}</small>
                            </div>`;
                        commentsList.appendChild(div);
                    });
                } catch (e) { commentsList.innerHTML = "Xəta baş verdi."; }
            }

            async function submitComment() {
                const token = localStorage.getItem('token');
                const text = commentTextarea.value.trim();
                if (!token || text === "") return;
                try {
                    const response = await fetch(`${API_URL}/comments`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                        body: JSON.stringify({ postId: post.id, videoIndex: currentVideoIndex, text }),
                    });
                    if (response.ok) { commentTextarea.value = ""; loadComments(post.id, currentVideoIndex); }
                } catch (e) { console.error(e); }
            }

            // --- VİDEO SİYAHISI ---
            const videoThumbnails = [];
            post.videos.forEach((v, i) => {
                const div = document.createElement("div");
                div.className = "video-thumbnail";
                if (i === 0) div.style.backgroundColor = "#e4e8eb";
                const coverUrl = post.videoCovers[i] || post.courseCover;
                const titleText = post.videoTitles[i] || "Video " + (i + 1);
                div.innerHTML = `<input type="checkbox" ${i === 0 ? 'checked' : ''}><img src="${coverUrl}"><span>${titleText}</span>`;
                videoThumbnails.push(div);
                list.appendChild(div);
                div.addEventListener("click", () => {
                    video.src = v; video.play(); currentVideoIndex = i;
                    loadComments(post.id, i);
                    videoThumbnails.forEach(t => t.style.backgroundColor = "#fff");
                    div.style.backgroundColor = "#e4e8eb";
                });
            });

            // --- İLKİN YÜKLƏMƏ ---
            video.src = post.videos[0];
            loadComments(post.id, 0);
            loadUserRating(post.id);
            loadDocuments();

            submitButton.addEventListener("click", submitComment);
            document.querySelector(".logo").addEventListener("click", () => window.location.href = "../index.html");

            // --- TAB İDARƏETMƏSİ ---
            const tabButtons = {
                overview: document.getElementById("overview-btn"),
                resources: document.getElementById("resources-btn"),
                comments: document.getElementById("comments-btn")
            };

            const sections = {
                overview: document.getElementById("overview-section"),
                resources: document.getElementById("resources-section"),
                commentsRating: document.getElementById("comments-rating-container")
            };

            function switchTab(activeTab) {
                Object.values(tabButtons).forEach(btn => btn.classList.remove("active-btn"));
                Object.values(sections).forEach(sec => sec.style.display = "none");

                if (activeTab === 'overview') {
                    tabButtons.overview.classList.add("active-btn");
                    sections.overview.style.display = "block";
                } else if (activeTab === 'resources') {
                    tabButtons.resources.classList.add("active-btn");
                    sections.resources.style.display = "block";
                } else {
                    tabButtons.comments.classList.add("active-btn");
                    sections.commentsRating.style.display = "block";
                }
            }

            tabButtons.overview.addEventListener("click", () => switchTab('overview'));
            tabButtons.resources.addEventListener("click", () => switchTab('resources'));
            tabButtons.comments.addEventListener("click", () => switchTab('comments'));
        }
    </script>
</body>

</html>
