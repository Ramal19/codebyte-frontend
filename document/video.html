<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kursa bax - CodeByte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary-dark: #1c1d1f;
            --accent-blue: #2da0fd;
            --text-main: #2d2f31;
            --text-light: #6a6f73;
            --border-color: #d1d7dc;
            --bg-light: #f7f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        header {
            background-color: var(--primary-dark);
            color: #fff;
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            border-bottom: 1px solid #3e4143;
        }

        .navbar {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: space-between;
        }

        .left-side {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .logo img {
            height: 30px;
            filter: brightness(0) invert(1);
        }

        .course-name {
            font-size: 14px;
            font-weight: 500;
            border-left: 1px solid #3e4143;
            padding-left: 15px;
            color: #d1d7dc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 400px;
        }

        /* MAIN CONTENT LAYOUT */
        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* LEFT SIDE: Video & Tabs */
        .video-container-main {
            flex: 3;
            overflow-y: auto;
            position: relative;
        }

        #main-video {
            width: 100%;
            background-color: #000;
            aspect-ratio: 16 / 9;
            display: block;
        }

        /* TABS AREA */
        .btns {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: #fff;
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .btn {
            background: none;
            border: none;
            padding: 15px 20px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }

        .btn.active-btn {
            color: var(--primary-dark);
            border-bottom: 2px solid var(--primary-dark);
        }

        /* CONTENT SECTIONS */
        .tab-content-wrapper {
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* RATING SECTION */
        .rating-section-container {
            background: var(--bg-light);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        .rating-section-container h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        #star-rating {
            display: flex;
            gap: 5px;
            margin: 10px 0;
        }

        .star {
            font-size: 30px;
            color: #ccc;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .star:hover {
            transform: scale(1.1);
        }

        #rating-message {
            font-size: 13px;
            color: var(--text-light);
        }

        /* COMMENT SECTION */
        #comment-input {
            margin-bottom: 40px;
        }

        #comment-input textarea {
            width: 100%;
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 4px;
            resize: none;
            font-size: 15px;
            margin-bottom: 10px;
        }

        #submit-comment {
            background: var(--primary-dark);
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }

        /* COMMENTS LIST */
        #comments-list {
            clear: both;
            margin-top: 50px;
        }

        .comment {
            display: flex;
            gap: 15px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .profil span {
            width: 45px;
            height: 45px;
            background: var(--primary-dark);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 700;
            text-transform: uppercase;
        }

        .comment-main strong {
            font-size: 15px;
            display: block;
            margin-bottom: 4px;
        }

        .comment-main p {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-main);
        }

        .comment-main small {
            color: var(--text-light);
            font-size: 12px;
            margin-top: 8px;
            display: block;
        }

        /* RIGHT SIDEBAR: Playlist */
        .thumbs {
            flex: 1;
            background-color: #fff;
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
        }

        .thumbs-header {
            padding: 15px 20px;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-light);
        }

        .video-thumbnail {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: 0.2s;
        }

        .video-thumbnail:hover {
            background-color: var(--bg-light);
        }

        .video-thumbnail input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .video-thumbnail img {
            width: 80px;
            border-radius: 4px;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        .video-thumbnail span {
            font-size: 13px;
            font-weight: 500;
            line-height: 1.3;
            color: var(--text-main);
        }

        /* Overlay */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #d1d7dc; }
    </style>
</head>

<body>

    <header>
        <div class="navbar">
            <div class="left-side">
                <div class="logo"><img src="../image/codebyteLogoMa.png" alt="Logo"></div>
                <div class="course-name">
                    <span id="course-title"></span>
                </div>
            </div>
            <div class="right-side">
                <i class="bi bi-person-circle" style="font-size: 1.2rem; cursor: pointer;"></i>
            </div>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="video-container-main">
            <div style="position: relative;">
                <video id="main-video" controlsList="nodownload" controls></video>
                <div class="video-overlay" id="video-overlay">
                    <img id="overlay-image" src="" alt="Qeyd qadağandır" style="display: none; max-width: 200px; margin-bottom: 20px;">
                    <p id="overlay-text">Video Dayandırıldı</p>
                </div>
            </div>

            <div class="btns">
                <button class="btn" id="searchVideoContent"><i class="bi bi-search"></i></button>
                <button class="btn" id="overview">Ümumi baxış</button>
                <button class="btn active-btn" id="comments">Rəylər</button>
            </div>

            <div class="tab-content-wrapper">
                <div class="rating-section-container" id="rating-section">
                    <h3>Kursa Reytinq Ver</h3>
                    <div id="star-rating">
                        <span class="star" data-score="1">☆</span>
                        <span class="star" data-score="2">☆</span>
                        <span class="star" data-score="3">☆</span>
                        <span class="star" data-score="4">☆</span>
                        <span class="star" data-score="5">☆</span>
                    </div>
                    <p id="rating-message">Kursu qiymətləndirərək bizə dəstək olun.</p>
                </div>

                <div class="comments-section-container" id="comments-section">
                    <h3>Şərhlər</h3>
                    <div id="comment-input">
                        <textarea id="comment-text" placeholder="Şərhinizi yazın..." rows="3"></textarea>
                        <button id="submit-comment">Şərh Yaz</button>
                    </div>
                    <div id="comments-list">
                        </div>
                </div>
            </div>
        </div>

        <div class="thumbs">
            <div class="thumbs-header">Kursun Məzmunu</div>
            <div id="video-list"></div>
        </div>
    </div>

    <script>
        // SƏNİN JS KODUN (Dəyişilməyib, sadəcə dizayn elementləri ilə inteqrasiya edilib)
        const API_URL = "https://codebyte-backend-ibyq.onrender.com";
        const post = JSON.parse(localStorage.getItem("selectedPost"));

        if (!post) {
            document.body.innerHTML = "<h3>Kurs tapılmadı</h3>";
        } else {
            document.getElementById("course-title").textContent = post.text;
            const video = document.getElementById("main-video");
            const list = document.getElementById("video-list");
            const commentsList = document.getElementById("comments-list");
            const commentTextarea = document.getElementById("comment-text");
            const submitButton = document.getElementById("submit-comment");
            const commentsSection = document.getElementById("comments-section");
            const ratingSection = document.getElementById("rating-section");
            const starRatingDiv = document.getElementById("star-rating");
            const ratingMessage = document.getElementById("rating-message");
            const stars = starRatingDiv.querySelectorAll('.star');

            let currentVideoIndex = 0;
            let userHasRated = false;
            let userCurrentScore = 0;

            const renderStars = (score) => {
                stars.forEach(star => {
                    const starScore = parseInt(star.dataset.score);
                    star.textContent = starScore <= score ? '★' : '☆';
                    star.style.color = starScore <= score ? '#b4690e' : '#ccc';
                });
            };

            const handleStarClick = async (score) => {
                const token = localStorage.getItem('token');
                if (!token) {
                    Swal.fire("Daxil Olun", "Reytinq vermək üçün daxil olmalısınız.", "warning");
                    return;
                }
                if (userHasRated) {
                    Swal.fire("Məlumat", "Siz artıq bu kursa reytinq vermisiniz.", "info");
                    return;
                }

                try {
                    const response = await fetch(`${API_URL}/rate-course`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`,
                        },
                        body: JSON.stringify({
                            courseId: post.id,
                            score: score,
                        }),
                    });

                    if (response.ok) {
                        userHasRated = true;
                        userCurrentScore = score;
                        Swal.fire("Uğurlu!", "Reytinqiniz qeydə alındı.", "success");
                        loadUserRating(post.id);
                    }
                } catch (error) {
                    console.error("Xəta:", error);
                }
            };

            async function loadUserRating(courseId) {
                const token = localStorage.getItem('token');
                try {
                    const res = await fetch(`${API_URL}/course-rating/${courseId}`);
                    const data = await res.json();
                    ratingMessage.textContent = `Kursun orta balı: ${data.averageRating.toFixed(1)} (${data.count} səs)`;
                } catch (e) { console.error(e); }

                if (!token) return;

                try {
                    const userRes = await fetch(`${API_URL}/user-rating/${courseId}`, {
                        headers: { "Authorization": `Bearer ${token}` },
                    });
                    if (userRes.ok) {
                        const userData = await userRes.json();
                        userHasRated = userData.hasRated;
                        userCurrentScore = userData.score;
                        if (userHasRated) {
                            renderStars(userCurrentScore);
                            starRatingDiv.style.pointerEvents = 'none';
                        }
                    }
                } catch (e) { console.error(e); }
            }

            stars.forEach(star => {
                star.addEventListener('click', () => handleStarClick(parseInt(star.dataset.score)));
                star.addEventListener('mouseover', () => renderStars(parseInt(star.dataset.score)));
                star.addEventListener('mouseout', () => renderStars(userCurrentScore));
            });

            async function loadComments(postId, videoIndex) {
                commentsList.innerHTML = "Yüklənir...";
                try {
                    const response = await fetch(`${API_URL}/comments/${postId}/${videoIndex}`);
                    const comments = await response.json();
                    commentsList.innerHTML = "";
                    if (comments.length === 0) {
                        commentsList.innerHTML = "<p>Hələ şərh yoxdur.</p>";
                        return;
                    }
                    comments.forEach(c => {
                        const div = document.createElement("div");
                        div.className = "comment";
                        let date = c.createdAt && c.createdAt._seconds ? new Date(c.createdAt._seconds * 1000).toLocaleDateString() : 'N/A';
                        div.innerHTML = `
                            <div class="profil"><span>${c.username[0]}</span></div>
                            <div class="comment-main">
                                <strong>${c.username}</strong>
                                <p>${c.text}</p>
                                <small>${date}</small>
                            </div>`;
                        commentsList.appendChild(div);
                    });
                } catch (e) { commentsList.innerHTML = "Xəta baş verdi."; }
            }

            async function submitComment() {
                const token = localStorage.getItem('token');
                const text = commentTextarea.value.trim();
                if (!token || text === "") return;

                try {
                    const response = await fetch(`${API_URL}/comments`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`,
                        },
                        body: JSON.stringify({ postId: post.id, videoIndex: currentVideoIndex, text }),
                    });
                    if (response.ok) {
                        commentTextarea.value = "";
                        loadComments(post.id, currentVideoIndex);
                    }
                } catch (e) { console.error(e); }
            }

            const videoThumbnails = [];
            post.videos.forEach((v, i) => {
                const div = document.createElement("div");
                div.className = "video-thumbnail";
                const coverUrl = post.videoCovers[i] || post.courseCover;
                const titleText = post.videoTitles[i] || "Video " + (i+1);

                div.innerHTML = `
                    <input type="checkbox" ${i === 0 ? 'checked' : ''}>
                    <img src="${coverUrl}">
                    <span>${titleText}</span>`;

                videoThumbnails.push(div);
                list.appendChild(div);

                div.addEventListener("click", () => {
                    video.src = v;
                    video.play();
                    currentVideoIndex = i;
                    loadComments(post.id, i);
                    videoThumbnails.forEach(t => t.style.backgroundColor = "#fff");
                    div.style.backgroundColor = "#e4e8eb";
                });
            });

            video.src = post.videos[0];
            loadComments(post.id, 0);
            loadUserRating(post.id);

            submitButton.addEventListener("click", submitComment);
            document.querySelector(".logo").addEventListener("click", () => window.location.href = "../index.html");

            // Tab idarəetməsi
            let buttons = document.querySelectorAll(".btn");
            buttons.forEach((btn, i) => {
                btn.addEventListener("click", () => {
                    buttons.forEach(b => b.classList.remove("active-btn"));
                    btn.classList.add("active-btn");
                    
                    if (i === 2) {
                        commentsSection.style.display = "block";
                        ratingSection.style.display = "block";
                    } else {
                        commentsSection.style.display = "none";
                        ratingSection.style.display = "none";
                    }
                });
            });
        }
    </script>
</body>
</html>
